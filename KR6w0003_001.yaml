body:
  text: 目連依教便修行供養三尊及大衆福利遐超鬼趣願我慈親領受之因茲息苦得停酸免受倒懸三𢙣道離却鬼前休𢙣趣得向園禮世尊因此厥號盂蘭盆接引衆生交離苦不獨當初為目連兼為今朝座下人故知大聖不思議流向𨶒浮化羣生為救世間諸苦難名曰盂蘭清淨經念觀世音菩佛子將釋此經大分三假苐一序分苐二正宗苐三流通分三假不同且初序分佛子上來即如斯略與門徒分別向下依經次苐陳不知道理復如何大衆須生敬重心道此經孝行各各𣫍心合掌著經文次苐唱將來經云聞如是一時佛在舍衛國樹給孤獨佛子西方梵語名佛陀此土為求覺者自覺覺他覺行圎滿覺行周圎號世尊於中三覺不思議別日與門徒廣分別今且略明妙法願聞障消除佛言舍衛國樹給孤獨園佛子舍衛國者好嘉名人物英雄心猛利國王太子兼長者諸佛如來住彼中給孤長者須達多聞佛功德心中喜火急歸來造精舍便買陀太子園四十里地布黃金建造如來説法處殿宇樓臺徦日月池華果用莊嚴佛當日在彼中這盂蘭清淨教為救目連慈母罪免交受苦生天上來多假義不同𢝰經文成就義從此下反是別序目連得道復如何大衆生敬重心六通之名當解釋各各虔茶合掌著目連得道唱將來經云大目揵連始得六通佛子恰似世間慈母身養得子時登官位威勢人間皆𢝰怕自出分憂佐大唐忽然憶著我耶娘取向本州專侍奉所得財物買珠瑱將來奉獻我尊親百味羞皆給恭日夜將心親侍奉若也悶來交合曲音聲歌儛不曾休朝朝甘脆父母前晝夜尋常居左右所要之間皆有意徒孝行遣人傳今此目連亦復然得道恰似為官位憶得先亡念慈親墮落三塗阿郍邊遂將天眼更遙觀欲覓尊親擬供養直為亡來年嵗久不知神識落何方乃知證得六神通根本還因求父母羅漢六通為苐一願報當初養育恩今此向下一唱經欲度父母報恩受大衆好生合掌著經文次第唱將來經云目連欲度父母報乳脯之恩佛子自得既圎應合救物懷其孝行欲報重恩經云度者即是度脫報恩兩字通摽經題且夫人生在世父母為親非母不生非母不長是以目連報其恩德佛子目連自得既周圎理合救其親父母心裏為懷行孝行報從來養育恩人生在世合如斯父母深恩須報答想得當初養育我受苦懷不可論除其孝順在眼前供給所須不闕少假使碎身千万劫不能報得母深恩將知恩德大難酬我佛如來再三奉勸座下佛弟子大須孝順莫因循佛子故父母恩重經云父母有十種恩卆難報答一者懷胎守護恩二者臨産受苦恩三者生子妄憂恩四者咽苦吐甘恩五者回乾就濕恩六者乳脯養育恩七者洗濯不淨恩八者為造𢙣業恩九者遠行憶念恩十者究竟憐愍恩佛子適來雖列十恩名義理差殊都未解門徒若要細分別先生敬重後依行苐一懷擔守護恩十月胎中常負重慈母將心憂姟子恐怕胎中不得安生時受苦命如斯赤血滂沱魂魄散時向之間却命由怕姟兒有殤生了心中便喜歡忘却憂愁如快樂眷屬親情皆𢝰喜慶賀今朝母子安漸漸姟兒長大時乾處唯留與子眠濕處回將母自臥洗濯之時無懈惓乳脯養育不辝勞寒熱都來為憐念由如掌上珠年登十五母由憂恐怕造諸不善業走去心中常憶念佛前發願早歸來四時八莭不前頭不覺目中雙淚下時向之間不得見恛惶惆悵似湯𤋎佛子他家孝順由憂耶娘不孝之男廣造𢙣業他州外鄉逐樂不歸父母此間肝腸寸斷佛子他家若是孝順之兒解向家中親侍奉若是心中不孝順逃走他鄉𢝰不歸因修向外嵗年間逐樂何曾憶父母所得錢財別受用肯解將來獻二親將知世界逆衆生罪過愚膚不可不報其恩不孝順墮向三塗𢙣道中奉勸門徒諸信心莫作如斯不孝人學取目連心裏命終必㝎見慈尊佛子上來道理轉殷勤聞道還須行孝行不但自家心裏了也令衆罪速消除盂蘭盆經觀故題此經讚不思冝留傳天下衆人知有緣得遇者蓮花會裏與君倚
