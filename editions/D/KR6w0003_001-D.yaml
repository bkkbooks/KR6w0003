body:
  text: 目連依教便脩行供養三尊及大眾福利遐超鬼趣願我慈親領受之因茲息苦得停酸免受倒懸三𢙣道離却鬼前休𢙣趣得向園礼世尊因此厥号𥁄蘭盆接引眾生交離苦不獨當初為目連兼為今朝座下人故知大聖不思議流向𨶒浮化羣生為救世間諸苦難名曰𥁄蘭清淨經念觀世音菩仏子將釋此經大分三叚苐一序分苐二正宗苐三流通分三叚不同且初序分仏子上来即如斯略与門徒分別向下依經次苐陳不知道理復如何大眾須生敬重心道此經孝行各各𣫍心合掌着經文次苐唱將来經云聞如是一時佛在舎衛國樹給孤獨仏子西方梵語名佛陁此土為求斍者自斍斍他覺行圎滿覺行周圎号世尊於中三覺不思議別日与門徒廣分別今且略明妙法願聞障消除仏言舎衛國樹給孤獨園仏子舎衛國者好嘉名人物英雄心猛利国王太子兼長者諸佛如来住彼中給孤長者湏達多聞佛功徳心中喜火急㱕来造精舎便買陁太子園四十里地布黃金建造如来說法處殿宇樓臺徦日月池華菓用㽵嚴仏當日在彼中這𥁄蘭清淨教為救目連慈母罪免交受苦生天上来多叚義不同𢝰經文成就義従此下反是別序目連得道復如何大眾生敬重心六通之名當解釋各各虔茶合掌着目連得道唱將来經云大目揵連始得六通仏子恰似世間慈母身養得子時登官位威勢人間皆𢝰怕自出分憂佐大唐忽然憶着我耶孃取向本州專侍奉所得財物買珠瑱將来奉獻我尊親百味羞皆給恭日夜將心親侍奉若也悶来交合曲音聲歌儛不曾𠇲朝朝甘脆父母前晝夜尋常居左右所要之間皆有意徒孝行遣人傳今此目連亦復然得道恰似為官位憶得先亡念慈親堕落三塗阿郍邊遂將天眼更遙觀欲覓尊親擬供養直為亡来年嵗久不知神識落何方乃知證得六神通根本還因求父母羅漢六通為苐一願報當初養育㤙今此向下一唱經欲度父母報㤙受大眾好生合掌着經文次第唱將来經云目連欲度父母報乳脯之㤙仏子自得既圎應合救物懷其孝行欲報重㤙經云度者即是度脫報㤙兩字通摽經題且夫人生在世父母為親非母不生非母不長是以目連報其㤙徳仏子目連自得既周圎理合救其親父母心裏為懷行孝行報従来養育㤙人生在世合如斯父母深㤙湏報荅想得當初養育我受苦懷不可論除其孝順在眼前供給所湏不闕少假使砕身千万刼不能報得母深㤙將知㤙徳大難酬我佛如来再三奉勸座下佛弟子大湏孝順莫因循仏子故父母㤙重經云父母有十種㤙卆難報荅一者懷胎守護㤙二者臨產受苦㤙三者生子妄憂㤙四者𠰸苦吐甘㤙五者迴乾就濕㤙六者乳脯養育㤙七者洗濯不淨㤙八者為造𢙣業㤙九者遠行憶念㤙十者究竟憐愍㤙仏子適来雖列十㤙名義理差殊都未解門徒若要細分別先生敬重後依行苐一懷擔守護㤙十月胎中常負重慈母將心憂姟子𢙢怕胎中不得安生時受苦命如斯赤血滂沲魂魄散時向之間却命由怕姟兒有殤生了心中便喜歡忘却憂愁如快樂眷属親情皆𢝰喜慶賀今朝母子安漸漸姟兒長大時乾處唯留與子眠濕處迴將母自臥洗濯之時無懈惓乳脯養育不辝勞寒熱都来為怜念由如掌上珠年登十五母由憂𢙢怕造諸不善業走去心中常憶念仏前發願早㱕来四時八莭不前頭不覺目中雙淚下時向之間不得見恛惶惆悵似湯𤋎仏子他家孝順由憂耶孃不孝之男廣造𢙣業他州外鄉逐樂不㱕父母此間肝膓寸断仏子他家若是孝順之兒解向家中親侍奉若是心中不孝順逃走他鄉𢝰不㱕囙脩向外嵗年間逐樂何曾憶父母所得錢財別受用肯解將来獻二親將知世界𨒫眾生罪過愚膚不可不報其㤙不孝順堕向三塗𢙣道中奉勸門徒諸信心莫作如斯不孝人斈取目連心裏命終必㝎見慈尊仏子上来道理轉殷勤聞道還湏行孝行不但自家心裏了也令眾罪速消除𥁄蘭盆經觀故題此經讚不思冝留傳天下眾人知有緣得遇者蓮花會裏与君𠋣
